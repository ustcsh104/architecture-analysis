<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" fill="#0f172a"/>
  <rect width="960" height="680" fill="url(#grid)"/>

  <!-- Title -->
  <text x="30" y="32" fill="#f1f5f9" font-size="16" font-weight="700">system-design-primer 架构分层图</text>
  <text x="30" y="48" fill="#64748b" font-size="9">Document-Driven Knowledge Repository | 文档驱动型知识仓库</text>

  <!-- ==================== Layer 1: 知识层 ==================== -->
  <rect x="40" y="70" width="880" height="130" rx="12" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="56" y="88" fill="#fbbf24" font-size="9" font-weight="600">知识层 Knowledge Layer</text>

  <!-- README.md -->
  <rect x="80" y="98" width="220" height="80" rx="6" fill="#0f172a"/>
  <rect x="80" y="98" width="220" height="80" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="190" y="124" fill="white" font-size="11" font-weight="600" text-anchor="middle">README.md</text>
  <text x="190" y="140" fill="#94a3b8" font-size="9" text-anchor="middle">系统设计理论知识库</text>
  <text x="190" y="154" fill="#94a3b8" font-size="9" text-anchor="middle">~1800行 | 8大板块</text>

  <!-- 多语言版 -->
  <rect x="340" y="98" width="180" height="80" rx="6" fill="#0f172a"/>
  <rect x="340" y="98" width="180" height="80" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="430" y="124" fill="white" font-size="11" font-weight="600" text-anchor="middle">多语言版</text>
  <text x="430" y="140" fill="#94a3b8" font-size="9" text-anchor="middle">zh-Hans | zh-TW | ja</text>
  <text x="430" y="154" fill="#94a3b8" font-size="9" text-anchor="middle">4种语言翻译</text>

  <!-- 知识板块 -->
  <rect x="560" y="98" width="320" height="80" rx="6" fill="#0f172a"/>
  <rect x="560" y="98" width="320" height="80" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="720" y="118" fill="white" font-size="11" font-weight="600" text-anchor="middle">8大知识板块</text>
  <text x="720" y="134" fill="#94a3b8" font-size="8" text-anchor="middle">基础→组件→数据库→缓存→异步→通信→安全→附录</text>
  <text x="720" y="150" fill="#94a3b8" font-size="8" text-anchor="middle">CAP理论 | 延迟数 | 2的次方表 | 面试四步法</text>
  <text x="720" y="164" fill="#94a3b8" font-size="8" text-anchor="middle">真实架构 | 公司博客 | 面试题集</text>

  <!-- ==================== Layer 2: 解答层 ==================== -->
  <rect x="40" y="220" width="880" height="190" rx="12" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="56" y="238" fill="#34d399" font-size="9" font-weight="600">解答层 Solution Layer</text>

  <!-- 系统设计题 -->
  <rect x="80" y="248" width="400" height="140" rx="6" fill="#0f172a"/>
  <rect x="80" y="248" width="400" height="140" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="280" y="270" fill="white" font-size="11" font-weight="600" text-anchor="middle">solutions/system_design/</text>
  <text x="280" y="286" fill="#94a3b8" font-size="9" text-anchor="middle">8道系统设计面试题（每题独立子目录）</text>
  <text x="100" y="306" fill="#34d399" font-size="8" text-anchor="start">pastebin  twitter  web_crawler  mint</text>
  <text x="100" y="320" fill="#34d399" font-size="8" text-anchor="start">social_graph  query_cache  sales_rank  scaling_aws</text>
  <text x="100" y="340" fill="#64748b" font-size="8" text-anchor="start">每题: README.md + 架构图(.png) + 代码(.py)</text>
  <text x="100" y="354" fill="#64748b" font-size="8" text-anchor="start">部分题: MapReduce实现 + 中文版README</text>
  <text x="100" y="372" fill="#fb7185" font-size="8" text-anchor="start">⚠ 各子目录间零依赖</text>

  <!-- OOP题 -->
  <rect x="520" y="248" width="360" height="140" rx="6" fill="#0f172a"/>
  <rect x="520" y="248" width="360" height="140" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="700" y="270" fill="white" font-size="11" font-weight="600" text-anchor="middle">solutions/object_oriented_design/</text>
  <text x="700" y="286" fill="#94a3b8" font-size="9" text-anchor="middle">6道OOP设计面试题</text>
  <text x="540" y="306" fill="#34d399" font-size="8" text-anchor="start">hash_table  lru_cache  call_center</text>
  <text x="540" y="320" fill="#34d399" font-size="8" text-anchor="start">deck_of_cards  parking_lot  online_chat</text>
  <text x="540" y="340" fill="#64748b" font-size="8" text-anchor="start">每题: Python代码(.py) + Jupyter Notebook</text>
  <text x="540" y="354" fill="#64748b" font-size="8" text-anchor="start">交互式学习 | 可直接运行</text>
  <text x="540" y="372" fill="#fb7185" font-size="8" text-anchor="start">⚠ 部分代码含 pass 占位（留作练习）</text>

  <!-- ==================== Layer 3: 资源层 ==================== -->
  <rect x="40" y="430" width="880" height="110" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="56" y="448" fill="#94a3b8" font-size="9" font-weight="600">资源层 Resource Layer</text>

  <!-- images -->
  <rect x="80" y="458" width="300" height="64" rx="6" fill="#0f172a"/>
  <rect x="80" y="458" width="300" height="64" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="230" y="480" fill="white" font-size="11" font-weight="600" text-anchor="middle">images/</text>
  <text x="230" y="496" fill="#94a3b8" font-size="9" text-anchor="middle">36张架构图+示意图（README引用）</text>
  <text x="230" y="510" fill="#64748b" font-size="8" text-anchor="middle">CAP | CDN | 负载均衡 | 缓存模式 | RPC</text>

  <!-- resources -->
  <rect x="420" y="458" width="460" height="64" rx="6" fill="#0f172a"/>
  <rect x="420" y="458" width="460" height="64" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="650" y="480" fill="white" font-size="11" font-weight="600" text-anchor="middle">resources/</text>
  <text x="650" y="496" fill="#94a3b8" font-size="9" text-anchor="middle">Anki卡牌(3套) | 学习导图 | OmniGraffle源文件</text>
  <text x="650" y="510" fill="#64748b" font-size="8" text-anchor="middle">System Design.apkg | OO Design.apkg | study_guide.png</text>

  <!-- ==================== Layer 4: 配置层 ==================== -->
  <rect x="40" y="560" width="880" height="60" rx="12" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="56" y="578" fill="#475569" font-size="9" font-weight="600">配置层 Config Layer</text>

  <rect x="80" y="580" width="800" height="28" rx="4" fill="rgba(30,41,59,0.3)" stroke="#475569" stroke-width="1"/>
  <text x="480" y="598" fill="#94a3b8" font-size="9" text-anchor="middle">.gitignore | .gitattributes | LICENSE.txt | CONTRIBUTING.md | TRANSLATIONS.md | epub-metadata.yaml | generate-epub.sh</text>

  <!-- ==================== 依赖箭头 ==================== -->
  <!-- 知识层 → 资源层（引用图片） -->
  <path d="M 190 178 L 190 200 L 230 200 L 230 458" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-amber)"/>
  <text x="170" y="400" fill="#fbbf24" font-size="8" transform="rotate(-90, 170, 400)">引用图片</text>

  <!-- 知识层 → 解答层（指向链接） -->
  <path d="M 280 178 L 280 248" fill="none" stroke="#34d399" stroke-width="1.5" stroke-opacity="0.7" marker-end="url(#arrow-cyan)"/>
  <text x="286" y="218" fill="#34d399" font-size="8">指向链接</text>

  <!-- 解答层 → 资源层（引用图片） -->
  <path d="M 280 388 L 280 418 L 230 418 L 230 458" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arrow-amber)"/>
  <text x="240" y="412" fill="#fbbf24" font-size="7">引用图片</text>

  <!-- ==================== 图例 ==================== -->
  <rect x="730" y="640" width="200" height="30" rx="4" fill="rgba(30,41,59,0.5)"/>
  <text x="740" y="658" fill="#64748b" font-size="8">📊 6步架构分析 | 2026-06-15</text>
</svg>
